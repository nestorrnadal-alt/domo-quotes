name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/domoquotes-build-deploy-0o7pkw
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root (index.html + assets). Excludes are handled by .nojekyll.
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
